<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pinheiro Broker — Demandas</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --verde: #3a5a40;
    --verde-clar: #e8f0e8;
    --verde-med: #5a7a5a;
    --ouro: #c9a84c;
    --ouro-clar: #fdf3e8;
    --cinza-esc: #1e2530;
    --cinza-med: #4a5568;
    --cinza-clar: #f7f8fa;
    --branco: #ffffff;
    --borda: #e2e8f0;
    --vermelho: #e53e3e;
    --azul: #3182ce;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #f0f4f0;
    color: var(--cinza-esc);
    min-height: 100vh;
  }

  /* TOPO */
  .topbar {
    background: var(--verde);
    padding: 0 2rem;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  }
  .topbar-left { display: flex; align-items: center; gap: 14px; }
  .logo-circle {
    width: 38px; height: 38px;
    background: var(--ouro);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 13px; color: #1a2e1c;
  }
  .topbar h1 { font-size: 16px; font-weight: 500; color: #fff; }
  .topbar p { font-size: 11px; color: #9ab89a; }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .conn-badge {
    font-size: 11px; padding: 4px 12px;
    border-radius: 20px; font-weight: 500; cursor: pointer;
    transition: all 0.2s;
  }
  .conn-ok { background: #eaf3de; color: #27500a; }
  .conn-err { background: #fcebeb; color: #791f1f; }
  .conn-load { background: #e6f1fb; color: #0c447c; }
  .vtabs { display: flex; gap: 4px; }
  .vtab {
    background: rgba(255,255,255,0.1);
    border: 0.5px solid rgba(255,255,255,0.2);
    color: #fff; padding: 6px 14px;
    border-radius: var(--radius-sm);
    font-size: 12px; cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }
  .vtab:hover { background: rgba(255,255,255,0.2); }
  .vtab.active { background: var(--ouro); border-color: var(--ouro); color: #1a2e1c; font-weight: 500; }

  /* LAYOUT */
  .container { max-width: 960px; margin: 0 auto; padding: 1.5rem 1rem; }

  /* STATS */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 1.5rem; }
  .stat-card {
    background: var(--branco);
    border-radius: var(--radius);
    padding: 16px 18px;
    border: 0.5px solid var(--borda);
  }
  .stat-label { font-size: 11px; color: var(--cinza-med); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-num { font-size: 28px; font-weight: 600; color: var(--cinza-esc); }
  .stat-num.amber { color: #854f0b; }
  .stat-num.blue { color: #185fa5; }
  .stat-num.green { color: #27500a; }
  .stat-num.red { color: #791f1f; }

  /* CARDS */
  .card {
    background: var(--branco);
    border-radius: var(--radius);
    padding: 1.5rem;
    margin-bottom: 1rem;
    border: 0.5px solid var(--borda);
  }
  .card-title {
    font-size: 14px; font-weight: 500;
    color: var(--cinza-esc);
    margin-bottom: 1.2rem;
    padding-bottom: 10px;
    border-bottom: 0.5px solid var(--borda);
    display: flex; align-items: center; gap: 8px;
  }
  .card-title-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--verde);
  }

  /* FORM */
  .fgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .fgrid.full { grid-template-columns: 1fr; }
  .fgroup label { font-size: 12px; color: var(--cinza-med); display: block; margin-bottom: 5px; font-weight: 500; }
  .fgroup input,
  .fgroup select,
  .fgroup textarea {
    width: 100%; font-size: 13px;
    padding: 9px 12px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--borda);
    background: var(--cinza-clar);
    color: var(--cinza-esc);
    font-family: 'DM Sans', sans-serif;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }
  .fgroup input:focus,
  .fgroup select:focus,
  .fgroup textarea:focus {
    border-color: var(--verde);
    box-shadow: 0 0 0 3px rgba(58,90,64,0.1);
    background: var(--branco);
  }
  .fgroup textarea { resize: vertical; min-height: 64px; }

  .btn {
    width: 100%; padding: 11px;
    background: var(--verde); color: #fff;
    border: none; border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 500;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: background 0.2s, transform 0.1s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn:hover { background: #2e4a32; }
  .btn:active { transform: scale(0.99); }
  .btn:disabled { background: #9ab89a; cursor: not-allowed; transform: none; }
  .btn-icon { font-size: 15px; }

  /* MEMBRO */
  .member-block { margin-bottom: 1rem; }
  .member-header {
    background: var(--cinza-clar);
    border: 0.5px solid var(--borda);
    border-radius: var(--radius);
    padding: 12px 16px;
    display: flex; align-items: center; gap: 12px;
    cursor: pointer; margin-bottom: 0;
    transition: background 0.2s;
  }
  .member-header:hover { background: #edf2ed; }
  .member-header.open { border-radius: var(--radius) var(--radius) 0 0; border-bottom: none; background: var(--verde-clar); }
  .avatar {
    width: 36px; height: 36px;
    border-radius: 50%; background: var(--verde);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; color: #fff; flex-shrink: 0;
  }
  .mname { font-size: 14px; font-weight: 500; color: var(--cinza-esc); }
  .minfo { font-size: 12px; color: var(--cinza-med); margin-top: 1px; }
  .email-pill {
    display: inline-flex; align-items: center; gap: 4px;
    background: #eaf3de; color: #27500a;
    font-size: 10px; padding: 2px 8px;
    border-radius: 20px; font-weight: 500; margin-left: 6px;
  }
  .no-email-pill {
    display: inline-flex; align-items: center;
    background: #fcebeb; color: #791f1f;
    font-size: 10px; padding: 2px 8px;
    border-radius: 20px; font-weight: 500; margin-left: 6px;
  }
  .mbadges { margin-left: auto; display: flex; gap: 6px; flex-wrap: wrap; }
  .badge { font-size: 11px; padding: 3px 9px; border-radius: 20px; font-weight: 500; }
  .bdg-p { background: #faeeda; color: #633806; }
  .bdg-a { background: #e6f1fb; color: #0c447c; }
  .bdg-c { background: #eaf3de; color: #27500a; }
  .bdg-t { background: #fcebeb; color: #791f1f; }
  .chevron { font-size: 11px; color: var(--cinza-med); margin-left: 6px; transition: transform 0.2s; }
  .chevron.open { transform: rotate(90deg); }
  .member-body {
    border: 0.5px solid var(--borda);
    border-top: none;
    border-radius: 0 0 var(--radius) var(--radius);
    padding: 12px;
    background: var(--branco);
  }

  /* DEMANDA CARD */
  .demand-card {
    background: var(--branco);
    border: 0.5px solid var(--borda);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    margin-bottom: 8px;
    transition: box-shadow 0.2s;
  }
  .demand-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
  .demand-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
  .demand-title { font-size: 13px; font-weight: 500; color: var(--cinza-esc); flex: 1; }
  .prio-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; flex-shrink: 0; }
  .pA { background: #e53e3e; } .pM { background: #dd6b20; } .pB { background: #38a169; }
  .status-pill { font-size: 10px; padding: 3px 9px; border-radius: 20px; font-weight: 500; white-space: nowrap; flex-shrink: 0; }
  .stP { background: #faeeda; color: #633806; }
  .stA { background: #e6f1fb; color: #0c447c; }
  .stC { background: #eaf3de; color: #27500a; }
  .stT { background: #fcebeb; color: #791f1f; }
  .demand-meta { font-size: 11px; color: var(--cinza-med); margin-bottom: 4px; }
  .demand-desc { font-size: 12px; color: var(--cinza-med); margin-bottom: 4px; }
  .demand-obs {
    font-size: 12px; color: var(--cinza-med);
    background: var(--cinza-clar);
    border-radius: var(--radius-sm); padding: 7px 10px;
    margin-top: 6px;
    border-left: 3px solid var(--borda);
  }
  .demand-obs strong { color: var(--cinza-esc); }
  .demand-actions { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .act-btn {
    font-size: 11px; padding: 4px 11px;
    border-radius: 6px;
    border: 1px solid var(--borda);
    background: var(--cinza-clar);
    color: var(--cinza-med); cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }
  .act-btn:hover { background: var(--branco); color: var(--cinza-esc); border-color: var(--cinza-med); }
  .act-btn.green { border-color: #38a169; color: #276749; }
  .act-btn.green:hover { background: #f0fff4; }
  .act-btn.blue { border-color: #3182ce; color: #2c5282; }
  .act-btn.blue:hover { background: #ebf8ff; }
  .act-btn.red { border-color: #e53e3e; color: #c53030; }
  .act-btn.red:hover { background: #fff5f5; }
  .obs-row { display: flex; gap: 8px; margin-top: 8px; }
  .obs-row input {
    flex: 1; font-size: 12px;
    padding: 7px 10px;
    border: 1px solid var(--borda);
    border-radius: var(--radius-sm);
    background: var(--cinza-clar);
    font-family: 'DM Sans', sans-serif;
    color: var(--cinza-esc);
    outline: none;
    transition: border-color 0.2s;
  }
  .obs-row input:focus { border-color: var(--verde); background: var(--branco); }
  .obs-row button {
    font-size: 12px; padding: 7px 14px;
    background: var(--verde); color: #fff;
    border: none; border-radius: var(--radius-sm);
    cursor: pointer; font-family: 'DM Sans', sans-serif;
    white-space: nowrap; font-weight: 500;
    transition: background 0.2s;
  }
  .obs-row button:hover { background: #2e4a32; }
  .empty { text-align: center; padding: 2rem; color: var(--cinza-med); font-size: 13px; }

  /* TOAST */
  #toast {
    position: fixed; bottom: -80px; left: 50%;
    transform: translateX(-50%);
    background: var(--cinza-esc); color: #fff;
    padding: 10px 22px; border-radius: var(--radius);
    font-size: 13px; font-weight: 500;
    white-space: nowrap; z-index: 999;
    transition: bottom 0.35s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: 0 4px 20px rgba(0,0,0,0.25);
  }
  #toast.show { bottom: 24px; }
  #toast.err { background: var(--vermelho); }
  #toast.ok { background: var(--verde); }

  /* SPINNER */
  .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .hidden { display: none !important; }

  @media (max-width: 600px) {
    .stats { grid-template-columns: repeat(2,1fr); }
    .fgrid { grid-template-columns: 1fr; }
    .topbar h1 { font-size: 14px; }
    .vtabs { display: none; }
  }
</style>
</head>
<body>

<div id="toast"></div>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo-circle">PB</div>
    <div>
      <h1>Pinheiro Broker — Demandas</h1>
      <p>Gestão de tarefas · notificação por e-mail</p>
    </div>
  </div>
  <div class="topbar-right">
    <span class="conn-badge conn-load" id="connBadge" onclick="testarConexao()" title="Clique para testar conexão">
      Verificando...
    </span>
    <div class="vtabs">
      <button class="vtab active" onclick="setView('membros')">Por membro</button>
      <button class="vtab" onclick="setView('todas')">Todas</button>
    </div>
  </div>
</div>

<div class="container">

  <!-- STATS -->
  <div class="stats" id="stats"></div>

  <!-- NOVA DEMANDA -->
  <div class="card">
    <div class="card-title"><span class="card-title-dot"></span>Nova demanda</div>
    <div class="fgrid">
      <div class="fgroup"><label>Título</label><input id="titulo" placeholder="Ex: Enviar contrato ao cliente"></div>
      <div class="fgroup"><label>Designar para</label><select id="membro"><option value="">Selecione o membro...</option></select></div>
    </div>
    <div class="fgrid">
      <div class="fgroup"><label>Prioridade</label>
        <select id="prio">
          <option value="Alta">Alta</option>
          <option value="Media" selected>Média</option>
          <option value="Baixa">Baixa</option>
        </select>
      </div>
      <div class="fgroup"><label>Prazo</label><input type="date" id="prazo"></div>
    </div>
    <div class="fgrid full">
      <div class="fgroup"><label>Descrição (opcional)</label><textarea id="desc" placeholder="Detalhes da demanda..."></textarea></div>
    </div>
    <button class="btn" id="btnCriar" onclick="criarDemanda()">
      <span class="btn-icon">+</span> Criar demanda e notificar por e-mail
    </button>
  </div>

  <!-- ADICIONAR MEMBRO -->
  <div class="card">
    <div class="card-title"><span class="card-title-dot"></span>Adicionar membro da equipe</div>
    <div class="fgrid">
      <div class="fgroup"><label>Nome completo</label><input id="nNome" placeholder="Ex: Ana Lima"></div>
      <div class="fgroup"><label>Cargo</label><input id="nCargo" placeholder="Ex: Assistente Administrativo"></div>
    </div>
    <div class="fgrid full">
      <div class="fgroup"><label>E-mail (obrigatório para notificações)</label><input id="nEmail" type="email" placeholder="ana@gmail.com"></div>
    </div>
    <button class="btn" onclick="addMembro()">
      <span class="btn-icon">+</span> Adicionar membro
    </button>
  </div>

  <!-- VIEWS -->
  <div id="vMembros"></div>
  <div id="vTodas" class="hidden"></div>

</div>

<script>
const WEBAPP = 'https://script.google.com/macros/s/AKfycbwl-8TnB6MYlYZZboztSsL2AyA9gHWt3FqqqpoEX7MON7bbOGIsLL5j_SfcDyng1KAKVg/exec';

let membros = JSON.parse(localStorage.getItem('pb_membros') || 'null') || [
  {id:'m1', nome:'Pedro Pinheiro', cargo:'Gestor', email:'pbagendamentos@gmail.com'},
  {id:'m2', nome:'Ana Lima', cargo:'Assistente Adm.', email:''},
  {id:'m3', nome:'Carlos Souza', cargo:'Corretor', email:''},
];
let demandas = JSON.parse(localStorage.getItem('pb_demandas') || '[]');
let view = 'membros';
let col = {};

function sv(){ localStorage.setItem('pb_membros', JSON.stringify(membros)); }
function sd(){ localStorage.setItem('pb_demandas', JSON.stringify(demandas)); }

function toast(msg, tipo='ok'){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + tipo;
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.className = '', 4000);
}

function setConn(s, msg){
  const b = document.getElementById('connBadge');
  b.className = 'conn-badge conn-' + s;
  b.textContent = msg;
}

async function testarConexao(){
  setConn('load', 'Verificando...');
  try {
    const r = await fetch(WEBAPP + '?t=' + Date.now());
    if(r.ok){
      const j = await r.json();
      setConn('ok', '✓ Conectado ao Sheets');
    } else {
      setConn('err', '✗ Erro ' + r.status);
    }
  } catch(e){
    setConn('err', '✗ Sem conexão');
  }
}

async function enviarWebApp(demanda){
  const mem = membros.find(m => m.id === demanda.membroId);
  if(!mem) return false;
  const body = {
    id: demanda.id,
    titulo: demanda.titulo,
    membro: mem.nome,
    email: mem.email || '',
    prioridade: demanda.prioridade,
    prazo: demanda.prazo || '',
    status: demanda.status,
    criadaEm: new Date(demanda.criadaEm).toLocaleString('pt-BR')
  };
  try {
    const r = await fetch(WEBAPP, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(body)
    });
    if(r.ok){
      const j = await r.json();
      return j.ok === true;
    }
    return false;
  } catch(e){ return false; }
}

function renderStats(){
  const t = demandas.length;
  const p = demandas.filter(d=>d.status==='Pendente').length;
  const a = demandas.filter(d=>d.status==='Andamento').length;
  const c = demandas.filter(d=>d.status==='Concluido').length;
  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="stat-label">Total</div><div class="stat-num">${t}</div></div>
    <div class="stat-card"><div class="stat-label">Pendentes</div><div class="stat-num amber">${p}</div></div>
    <div class="stat-card"><div class="stat-label">Em andamento</div><div class="stat-num blue">${a}</div></div>
    <div class="stat-card"><div class="stat-label">Concluídas</div><div class="stat-num green">${c}</div></div>`;
}

function renderSelect(){
  const s = document.getElementById('membro');
  const cur = s.value;
  s.innerHTML = '<option value="">Selecione o membro...</option>';
  membros.forEach(m => {
    const o = document.createElement('option');
    o.value = m.id;
    o.textContent = m.nome + (m.email ? ' ✉' : ' (sem e-mail)');
    if(m.id === cur) o.selected = true;
    s.appendChild(o);
  });
}

function setView(v){
  view = v;
  document.querySelectorAll('.vtab').forEach((b,i) =>
    b.classList.toggle('active', (i===0&&v==='membros')||(i===1&&v==='todas')));
  document.getElementById('vMembros').classList.toggle('hidden', v !== 'membros');
  document.getElementById('vTodas').classList.toggle('hidden', v !== 'todas');
  renderView();
}

function renderView(){ view==='membros' ? renderMembros() : renderTodas(); }

function initials(n){ return n.split(' ').slice(0,2).map(x=>x[0]).join('').toUpperCase(); }

function renderMembros(){
  const c = document.getElementById('vMembros');
  if(!membros.length){ c.innerHTML = '<div class="empty">Nenhum membro cadastrado.</div>'; return; }
  c.innerHTML = membros.map(m => {
    const md = demandas.filter(d => d.membroId === m.id);
    const p = md.filter(d=>d.status==='Pendente').length;
    const a = md.filter(d=>d.status==='Andamento').length;
    const cc = md.filter(d=>d.status==='Concluido').length;
    const tr = md.filter(d=>d.status==='Atrasado').length;
    const isOpen = !col[m.id];
    return `<div class="member-block">
      <div class="member-header ${isOpen?'open':''}" onclick="toggleCol('${m.id}')">
        <div class="avatar">${initials(m.nome)}</div>
        <div>
          <div class="mname">${m.nome}${m.email
            ? `<span class="email-pill">✉ ${m.email}</span>`
            : '<span class="no-email-pill">sem e-mail</span>'}</div>
          <div class="minfo">${m.cargo} · ${md.length} demanda${md.length!==1?'s':''}</div>
        </div>
        <div class="mbadges">
          ${p>0?`<span class="badge bdg-p">${p} pendente${p>1?'s':''}</span>`:''}
          ${a>0?`<span class="badge bdg-a">${a} andamento</span>`:''}
          ${tr>0?`<span class="badge bdg-t">${tr} atrasado${tr>1?'s':''}</span>`:''}
          ${cc>0?`<span class="badge bdg-c">${cc} concluída${cc>1?'s':''}</span>`:''}
        </div>
        <span class="chevron ${isOpen?'open':''}">▶</span>
      </div>
      ${isOpen ? `<div class="member-body">${renderCards(md)}</div>` : ''}
    </div>`;
  }).join('');
}

function renderTodas(){
  const c = document.getElementById('vTodas');
  if(!demandas.length){ c.innerHTML = '<div class="empty">Nenhuma demanda criada.</div>'; return; }
  const ord = {Atrasado:0,Pendente:1,Andamento:2,Concluido:3};
  const sorted = [...demandas].sort((a,b) => (ord[a.status]||0)-(ord[b.status]||0));
  c.innerHTML = `<div class="card">${renderCards(sorted, true)}</div>`;
}

function renderCards(lista, showMem=false){
  if(!lista.length) return '<div class="empty">Sem demandas atribuídas.</div>';
  return lista.map(d => {
    const m = membros.find(x => x.id === d.membroId);
    const mNome = m ? m.nome : '—';
    const prazoFmt = d.prazo ? new Date(d.prazo+'T12:00:00').toLocaleDateString('pt-BR') : '';
    const sk = d.status==='Concluido'?'C':d.status==='Andamento'?'A':d.status==='Atrasado'?'T':'P';
    const sl = d.status==='Concluido'?'Concluída':d.status==='Andamento'?'Em andamento':d.status;
    const pk = d.prioridade==='Alta'?'A':d.prioridade==='Baixa'?'B':'M';
    return `<div class="demand-card">
      <div class="demand-top">
        <div class="demand-title"><span class="prio-dot p${pk}"></span>${d.titulo}</div>
        <span class="status-pill st${sk}">${sl}</span>
      </div>
      <div class="demand-meta">
        ${showMem?`<strong>${mNome}</strong> · `:''}
        Prioridade: ${d.prioridade}
        ${prazoFmt?' · Prazo: '+prazoFmt:''}
        · Criada: ${new Date(d.criadaEm).toLocaleDateString('pt-BR')}
      </div>
      ${d.descricao?`<div class="demand-desc">${d.descricao}</div>`:''}
      ${d.obs?`<div class="demand-obs"><strong>Obs:</strong> ${d.obs}</div>`:''}
      <div class="demand-actions">
        ${d.status!=='Concluido'?`<button class="act-btn green" onclick="chgStatus('${d.id}','Concluido')">✓ Concluída</button>`:''}
        ${d.status!=='Andamento'&&d.status!=='Concluido'?`<button class="act-btn blue" onclick="chgStatus('${d.id}','Andamento')">Em andamento</button>`:''}
        ${d.status!=='Atrasado'&&d.status!=='Concluido'?`<button class="act-btn red" onclick="chgStatus('${d.id}','Atrasado')">Atrasado</button>`:''}
        ${d.status==='Concluido'?`<button class="act-btn blue" onclick="chgStatus('${d.id}','Andamento')">Reabrir</button>`:''}
        <button class="act-btn red" onclick="excluir('${d.id}')">Excluir</button>
      </div>
      <div class="obs-row">
        <input id="obs-${d.id}" placeholder="Adicionar observação..." value="${d.obs||''}">
        <button onclick="salvarObs('${d.id}')">Salvar obs.</button>
      </div>
    </div>`;
  }).join('');
}

function toggleCol(id){ col[id] = !col[id]; renderView(); }

async function criarDemanda(){
  const titulo = document.getElementById('titulo').value.trim();
  const membroId = document.getElementById('membro').value;
  const prioridade = document.getElementById('prio').value;
  const prazo = document.getElementById('prazo').value;
  const descricao = document.getElementById('desc').value.trim();
  if(!titulo){ toast('Informe o título da demanda.','err'); return; }
  if(!membroId){ toast('Selecione um membro.','err'); return; }

  const mem = membros.find(m => m.id === membroId);
  const btn = document.getElementById('btnCriar');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Enviando...';
  setConn('load', 'Registrando...');

  const d = {
    id: 'd'+Date.now(), titulo, membroId, prioridade,
    prazo, descricao, status: 'Pendente',
    obs: '', criadaEm: new Date().toISOString()
  };
  demandas.push(d);
  sd();

  const ok = await enviarWebApp(d);

  btn.disabled = false;
  btn.innerHTML = '<span class="btn-icon">+</span> Criar demanda e notificar por e-mail';

  if(ok){
    setConn('ok','✓ Conectado ao Sheets');
    if(mem && mem.email){
      toast('Demanda criada! E-mail enviado para ' + mem.email + ' ✓','ok');
    } else {
      toast('Demanda registrada no Sheets. Adicione o e-mail do membro.','err');
    }
  } else {
    setConn('ok','✓ Salvo localmente');
    toast('Demanda salva! Verifique a conexão com o Sheets.','err');
  }

  document.getElementById('titulo').value = '';
  document.getElementById('desc').value = '';
  const np = new Date(); np.setDate(np.getDate()+7);
  document.getElementById('prazo').value = np.toISOString().split('T')[0];
  renderAll();
}

async function addMembro(){
  const nome = document.getElementById('nNome').value.trim();
  const cargo = document.getElementById('nCargo').value.trim();
  const email = document.getElementById('nEmail').value.trim();
  if(!nome){ toast('Informe o nome.','err'); return; }
  if(!email){ toast('Informe o e-mail para notificações.','err'); return; }
  membros.push({id:'m'+Date.now(), nome, cargo:cargo||'Membro', email});
  sv();
  document.getElementById('nNome').value = '';
  document.getElementById('nCargo').value = '';
  document.getElementById('nEmail').value = '';
  toast('Membro adicionado com sucesso! ✓','ok');
  renderAll();
}

function chgStatus(id, s){
  const d = demandas.find(x => x.id===id);
  if(d){ d.status=s; sd(); renderAll(); }
}

function salvarObs(id){
  const obs = document.getElementById('obs-'+id)?.value.trim();
  const d = demandas.find(x => x.id===id);
  if(d){ d.obs=obs; sd(); renderAll(); toast('Observação salva! ✓','ok'); }
}

function excluir(id){
  if(!confirm('Excluir esta demanda?')) return;
  demandas = demandas.filter(x => x.id!==id);
  sd(); renderAll();
}

function renderAll(){ renderStats(); renderSelect(); renderView(); }

const n = new Date(); n.setDate(n.getDate()+7);
pd.value = n.toISOString().split('T')[0];
renderAll();
testarConexao();
</script>
